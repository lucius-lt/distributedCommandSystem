<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Run Diagnostic</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<main class="shell">
    <a class="back-link" th:href="@{/}">Back to dashboard</a>

    <section class="hero compact">
        <p class="eyebrow">Agent diagnostics</p>
        <h1 th:text="${name}"></h1>
        <p>Type an allowlisted command such as whoami, hostname, pwd, date, ls, dir, ping, info, time, or help.</p>
    </section>

    <section class="panel">
        <form th:action="@{'/' + ${name} + '/diagnostics'}" method="post">
            <label for="command">Command</label>
            <input id="command" name="command" placeholder="whoami" autocomplete="off" required>
            <button type="submit">Run diagnostic</button>
        </form>
    </section>

    <section class="panel" th:if="${cmdoutput != null}">
        <h2>Output</h2>
        <pre th:text="${cmdoutput}"></pre>
    </section>
</main>
</body>
</html>
